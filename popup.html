<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormFill AI</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1ea;
      --panel: #fffdf9;
      --border: #e5d9c9;
      --text: #241f1a;
      --muted: #786b60;
      --accent: #6d28d9;
      --accent-soft: #efe7ff;
      --secondary: #f2ede4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 320px;
      min-height: 220px;
      padding: 18px;
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(109, 40, 217, 0.12), transparent 35%),
        linear-gradient(180deg, var(--bg) 0%, #efe8dd 100%);
      color: var(--text);
    }

    main {
      background: rgba(255, 253, 249, 0.96);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 18px 36px rgba(36, 31, 26, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    p {
      margin: 8px 0 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(36, 31, 26, 0.08);
    }

    button:active {
      transform: translateY(0);
    }

    .secondary {
      background: var(--secondary);
      color: var(--text);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: #5b21b6;
    }

    .status {
      min-height: 18px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .status.success {
      color: #166534;
    }

    .status.error {
      color: #b42318;
    }
  </style>
</head>
<body>
  <main>
    <h1>지원서 자동 입력</h1>
    <p>팝업은 시작 버튼만 보여주고, 실제 이력 정보 입력과 자동 입력은 오른쪽 패널에서 진행합니다.</p>

    <div class="actions">
      <button type="button" class="secondary" id="openInfoBtn">정보입력</button>
      <button type="button" class="primary" id="openFillBtn">현재 페이지에 자동 입력</button>
    </div>

    <div id="status" class="status" aria-live="polite"></div>
  </main>

  <script type="module" src="/popup.js"></script>
</body>
</html>
