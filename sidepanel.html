<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormFill AI Side Panel</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ec;
      --card: rgba(255, 255, 255, 0.96);
      --card-soft: #f6f0ff;
      --border: #e7ddf4;
      --text: #201a26;
      --muted: #7b7384;
      --accent: #6d28d9;
      --accent-strong: #5b21b6;
      --accent-soft: #f2eaff;
      --secondary: #efe8f6;
      --success: #166534;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 360px;
      background:
        radial-gradient(circle at top left, rgba(109, 40, 217, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, #f9f7f3 100%);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
    }

    .shell {
      min-height: 100vh;
      padding: 18px 16px 24px;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(68, 40, 112, 0.06);
    }

    .card h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .section-group {
      display: grid;
      gap: 12px;
    }

    .accordion {
      border: 1px solid #ece3f7;
      border-radius: 20px;
      background: #fff;
      overflow: hidden;
    }

    .accordion + .accordion {
      margin-top: 2px;
    }

    .accordion-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border: 0;
      border-radius: 0;
      background: #fff;
      color: var(--text);
      box-shadow: none;
    }

    .accordion-header:hover {
      transform: none;
      box-shadow: none;
      background: #fcfaff;
    }

    .accordion-header:active {
      transform: none;
    }

    .accordion-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .accordion-index {
      color: var(--accent);
    }

    .accordion-caret {
      width: 12px;
      height: 12px;
      border-right: 2px solid var(--accent);
      border-bottom: 2px solid var(--accent);
      transform: rotate(45deg);
      transition: transform 160ms ease;
      flex: 0 0 auto;
      margin-right: 4px;
    }

    .accordion.open .accordion-caret {
      transform: rotate(225deg);
      margin-top: 6px;
    }

    .accordion-body {
      display: none;
      padding: 0 18px 18px;
      background: linear-gradient(180deg, #fffdf6 0%, #ffffff 100%);
      border-top: 1px solid #f0e8fa;
    }

    .accordion.open .accordion-body {
      display: block;
    }

    .subcard {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: #fffdf5;
      border: 1px solid #f5ead0;
    }

    .subcard + .subcard {
      margin-top: 12px;
    }

    .subcard-title {
      margin: 0;
      color: #d97706;
      font-size: 16px;
      font-weight: 800;
    }

    .section-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-toolbar p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .add-inline-button,
    .remove-inline-button {
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 700;
      box-shadow: none;
      transform: none;
    }

    .add-inline-button {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .remove-inline-button {
      background: #fef2f2;
      color: var(--danger);
    }

    .certificate-card {
      background: #fff;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: #3f3650;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #ddd1ee;
      border-radius: 14px;
      padding: 11px 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .choice-row {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      min-height: 44px;
      padding: 0 2px;
    }

    .choice-row label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .choice-row input[type="radio"],
    .choice-row input[type="checkbox"] {
      width: auto;
      margin: 0;
      padding: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 15px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(46, 21, 92, 0.08);
    }

    button:active {
      transform: translateY(0);
    }

    .secondary {
      background: var(--secondary);
      color: var(--text);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-strong);
    }

    .status {
      min-height: 18px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 420px) {
      .inline-grid,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="stack">
      <section class="card">
        <h2>내 이력 정보</h2>
        <p>여기에 입력한 내용은 저장되어 이후 자동 입력에 재사용됩니다.</p>

        <div id="status" class="status" aria-live="polite"></div>

        <form id="resumeForm">

          <div class="actions">

            <button type="button" class="primary" id="fillBottomBtn">현재 페이지에 자동 입력</button>

                </div>

                <div class="inline-grid">

                        남

                </div>

                <div class="field">
                  <label for="email">이메일</label>
                  <input id="email" name="email" type="email" placeholder="resume@example.com">
                </div>

                <div class="field">
                  <label for="phone">전화번호</label>
                  <input id="phone" name="phone" type="tel" placeholder="010-1234-5678">
                </div>

                <div class="inline-grid">
                  <div class="field">
                    <label for="zipCode">우편번호</label>
                    <input id="zipCode" name="zipCode" type="text" placeholder="12345">
                  </div>

                  <div class="field">
                    <label for="address">주소</label>
                    <input id="address" name="address" type="text" placeholder="서울특별시 강남구">
                  </div>
                </div>

                <div class="field">

                  <input id="addressDetail" name="addressDetail" type="text" placeholder="101동 1203호">

                <div class="inline-grid">

                  <div class="field">

                  </div>

                <div class="inline-grid">
                  <div class="field">
                    <label for="experienceLevel">신입/경력</label>
                    <select id="experienceLevel" name="experienceLevel">

            </section>

            <div class="inline-grid">

                  <option value="미필">미필</option>

                  <option value="원수">원수</option>

                </select>

            </div>

            <div class="inline-grid">

                <label for="militaryStartDate">복무 시작일</label>

            <div class="field">

                <option value="">선택하세요</option>

                <option value="상이제대">상이제대</option>
              </select>
            </div>
              </div>
            </section>

            <section class="accordion" data-accordion>
              <button type="button" class="accordion-header" data-accordion-trigger aria-expanded="false">
                <span class="accordion-title">
                  <span class="accordion-index">(3)</span>

              <div class="accordion-body">
